<!DOCTYPE html>
<html lang="th">
<head><meta charset="UTF-8"></head>
<body style="font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
    <h2>ยืนยันการรับแจ้งเตือนเลขจอง</h2>
    <p>สวัสดีครับ/ค่ะ</p>
    <p>คุณได้ลงทะเบียนรับการแจ้งเตือนสำหรับ:</p>
    <ul>
        <li><strong>เลขทะเบียน:</strong> {desired_number}</li>
        <li><strong>ประเภทรถ:</strong> {vehicle_type}</li>
    </ul>
    <p>กรุณากดปุ่มด้านล่างเพื่อยืนยันภายใน 24 ชั่วโมง:</p>
    <p>
        <a href="{confirm_url}"
           style="display: inline-block; background: #2563eb; color: white; padding: 12px 24px;
                  text-decoration: none; border-radius: 6px; font-size: 16px;">
            ยืนยันการรับแจ้งเตือน
        </a>
    </p>
    <p style="color: #666; font-size: 14px;">
        หากคุณไม่ได้ลงทะเบียน กรุณาเพิกเฉยอีเมลนี้
    </p>
</body>
</html>
